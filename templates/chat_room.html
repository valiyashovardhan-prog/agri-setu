<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat with {{ other_user.username }} | Agri Setu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CRITICAL LAYOUT RESETS --- */
        html, body {
            height: 100%; width: 100%; margin: 0; padding: 0 !important;
            overflow: hidden; font-family: 'Poppins', sans-serif;
            background: var(--cream-bg); display: flex; flex-direction: column;
        }

        .mobile-nav, .navbar, .chat-btn, .hero-section { display: none !important; }

        .app-layout {
            display: flex; width: 100%; height: 100%; max-width: 1400px;
            margin: 0 auto; background: white; position: relative; overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
        }

        /* 1. SIDEBAR */
        .sidebar {
            width: 350px; min-width: 320px; height: 100%; background: #ffffff;
            border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; z-index: 20;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .sidebar-header {
            height: 80px; min-height: 80px; background: white; display: flex; align-items: center; padding: 0 25px;
            border-bottom: 1px solid #f5f5f5;
        }

        .back-dashboard-btn {
            display: inline-flex; align-items: center; gap: 10px; padding: 10px 15px; background: #f0fdf4; color: #2E7D32;
            border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: 0.2s; border: 1px solid #d1fae5;
        }
        .back-dashboard-btn:hover { background: #2E7D32; color: white; transform: translateY(-2px); }

        .contact-list { flex: 1; overflow-y: auto; padding: 15px; background: #fafafa; }

        .contact-item {
            display: flex; align-items: center; padding: 15px; background: white; border-radius: 16px; margin-bottom: 10px;
            cursor: pointer; transition: all 0.3s ease; text-decoration: none; color: inherit;
            border: 1px solid transparent; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .contact-item:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .contact-item.active { background: #ffffff; border-color: #FFC107; box-shadow: 0 5px 20px rgba(255, 193, 7, 0.15); }

        .contact-avatar { width: 48px; height: 48px; border-radius: 50%; margin-right: 15px; flex-shrink: 0; object-fit: cover; }
        .contact-info { flex: 1; min-width: 0; }
        .contact-name { font-weight: 700; font-size: 1.05rem; color: #222; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .contact-preview { font-size: 0.85rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 2. CHAT WINDOW */
        .room-window {
            flex: 1; display: flex; flex-direction: column; height: 100%;
            background: linear-gradient(135deg, #F5F7F8 0%, #E8F5E9 100%); position: relative;
        }

        .room-header {
            height: 75px; min-height: 75px; background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.5); display: flex; align-items: center; padding: 0 25px; gap: 15px;
            position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .room-area {
            flex: 1; overflow-y: auto; padding: 25px 10%; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth;
        }

        /* --- THE CHAT BUBBLES (Fixed Specificity & Colors) --- */
        #chatContainer .message-bubble {
            max-width: 75%; padding: 14px 20px; font-size: 1rem; position: relative; line-height: 1.5; word-wrap: break-word;
            animation: popIn 0.3s ease-out forwards; opacity: 1;
        }

        /* ABSOLUTE FIX: Sent Message Background Color Forced with High Specificity */
        #chatContainer .msg-sent { 
            align-self: flex-end !important; 
            background-color: #2E7D32 !important; /* Solid Green Fallback */
            background-image: linear-gradient(135deg, #2E7D32, #4CAF50) !important; /* Green Gradient */
            color: #ffffff !important; /* White Text */
            border-radius: 20px 20px 4px 20px !important; 
            border: none !important;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3) !important; /* Glow Effect */
        }
        
        #chatContainer .msg-received { 
            align-self: flex-start !important; 
            background-color: #ffffff !important; 
            color: #222222 !important; 
            border: 1px solid rgba(0,0,0,0.05) !important;
            border-radius: 20px 20px 20px 4px !important; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.04) !important;
        }

        #chatContainer .msg-time { 
            font-size: 0.75rem; float: right; margin-left: 15px; margin-top: 8px; font-weight: 500; 
        }
        #chatContainer .msg-sent .msg-time { color: rgba(255, 255, 255, 0.8) !important; }
        #chatContainer .msg-received .msg-time { color: rgba(0, 0, 0, 0.5) !important; }

        /* --- FLOATING INPUT BAR --- */
        .room-input-container { padding: 15px 10%; background: transparent; position: relative; }
        .room-input-wrapper {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 40px; padding: 8px 10px; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.6);
        }

        .room-input-wrapper input {
            flex: 1; padding: 12px 20px !important; border: none !important; outline: none; font-size: 1.05rem !important; background: transparent !important; color: #333; height: auto !important; margin: 0 !important;
        }

        .send-btn {
            width: 50px !important; height: 50px !important; border-radius: 50% !important; background: #FFC107 !important; color: #3e2723 !important;
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; padding: 0 !important; flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4); transition: transform 0.2s;
        }

        @keyframes popIn { from { transform: translateY(10px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        /* 3. MOBILE STYLES */
        .back-btn-mobile { display: none; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; width: 100%; height: 100%; z-index: 100; box-shadow: 5px 0 30px rgba(0,0,0,0.1); }
            .sidebar.hidden { transform: translateX(-105%); box-shadow: none; }
            
            .room-window { width: 100%; }
            .room-area { padding: 20px 15px; } 
            #chatContainer .message-bubble { max-width: 85%; font-size: 0.95rem; padding: 12px 16px; }
            .room-input-container { padding: 10px 15px 20px 15px; } 
            
            .room-header { padding: 0 15px; height: 70px; min-height: 70px; }
            
            .back-btn-mobile { 
                display: inline-flex; align-items: center; justify-content: center; margin-right: 10px; color: #2E7D32; cursor: pointer;
                width: 40px; height: 40px; border-radius: 50%; background: #f0fdf4;
            }
            .chat-partner-name { font-size: 1.1rem; font-weight: 700; color: #222; }
            .chat-partner-role { font-size: 0.75rem; color: #fff; background: #4CAF50; padding: 2px 8px; border-radius: 10px; margin-top: 2px; display: inline-block;}
        }
    </style>
</head>
<body>

    <div class="app-layout">
        
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="{{ url_for('home') }}" class="back-dashboard-btn">
                    <i class="fas fa-arrow-left"></i> Dashboard
                </a>
            </div>
            
            <div class="contact-list">
                <div style="padding: 5px 10px 15px 10px; font-weight: 700; color: #aaa; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">
                    Active Conversations
                </div>
                
                {% if conversations is defined and conversations %}
                    {% for chat in conversations %}
                    <a href="{{ url_for('chat_room', other_user_id=chat.id) }}" class="contact-item {% if chat.id == other_user.id %}active{% endif %}">
                        <img src="https://ui-avatars.com/api/?name={{ chat.username }}&background=2E7D32&color=fff" class="contact-avatar">
                        <div class="contact-info">
                            <div class="contact-name">
                                <span>{{ chat.username }}</span>
                                <span style="font-size: 0.7rem; color: #aaa; font-weight: 500;">{{ chat.role }}</span>
                            </div>
                            <div class="contact-preview">{{ chat.last_message }}</div>
                        </div>
                    </a>
                    {% endfor %}
                {% else %}
                    <div style="padding: 40px 20px; text-align: center; color: #999;">
                        <i class="fas fa-leaf fa-3x" style="margin-bottom: 15px; opacity: 0.2;"></i>
                        <p>No connections yet.</p>
                    </div>
                {% endif %}
            </div>
        </div>

        <div class="room-window">
            
            <div class="room-header">
                <div class="back-btn-mobile" onclick="showSidebar()">
                    <i class="fas fa-bars"></i>
                </div>
                
                <img src="https://ui-avatars.com/api/?name={{ other_user.username }}&background=FFC107&color=3e2723" class="contact-avatar" style="margin-right: 10px;">
                
                <div>
                    <div class="chat-partner-name">{{ other_user.username }}</div>
                    <div class="chat-partner-role">{{ other_user.role }}</div>
                </div>
            </div>

            <div class="room-area" id="chatContainer">
                <div style="text-align: center; color: #888; margin-top: 30px;">
                    <i class="fas fa-circle-notch fa-spin"></i> Syncing chat...
                </div>
            </div>

            <div class="room-input-container">
                <div class="room-input-wrapper">
                    <input type="text" id="msgInput" placeholder="Type your message here..." autocomplete="off">
                    <button class="send-btn" onclick="sendMsg()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const receiverId = {{ other_user.id }};
        const sidebar = document.getElementById('sidebar');
        
        function showSidebar() { sidebar.classList.remove('hidden'); }

        if (window.innerWidth <= 768) {
            sidebar.classList.add('hidden');
            let touchstartX = 0;
            document.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
            document.addEventListener('touchend', e => {
                if (e.changedTouches[0].screenX - touchstartX > 100) showSidebar();
                if (touchstartX - e.changedTouches[0].screenX > 100) sidebar.classList.add('hidden');
            });
        }

        function formatTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function loadMessages() {
            fetch('/api/get_messages/' + receiverId)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('chatContainer');
                let html = '';
                
                if (data.length === 0) {
                    html = '<div style="text-align: center; color: #888; margin-top: 50px; background: rgba(255,255,255,0.7); padding: 15px 30px; border-radius: 30px; display: inline-block; align-self: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">Start a conversation with <strong>' + '{{ other_user.username }}' + '</strong> 🤝</div>';
                } else {
                    data.forEach(msg => {
                        const isMe = (msg.sender_id != receiverId); 
                        const bubbleClass = isMe ? 'msg-sent' : 'msg-received';
                        const time = formatTime(msg.created_at);
                        html += `<div class="message-bubble ${bubbleClass}">${msg.message}<span class="msg-time">${time}</span></div>`;
                    });
                }
                
                if (container.innerHTML !== html) {
                    const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 150;
                    container.innerHTML = html;
                    if (isAtBottom || data.length < 5) container.scrollTop = container.scrollHeight;
                }
            });
        }

        function sendMsg() {
            const input = document.getElementById('msgInput');
            const txt = input.value.trim();
            if(!txt) return;

            const container = document.getElementById('chatContainer');
            const tempDiv = document.createElement('div');
            tempDiv.className = 'message-bubble msg-sent';
            tempDiv.innerHTML = `${txt} <span class="msg-time"><i class="far fa-clock"></i></span>`;
            container.appendChild(tempDiv);
            container.scrollTop = container.scrollHeight;
            input.value = ''; 

            fetch('/api/send_message', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ receiver_id: receiverId, message: txt })
            }).then(() => loadMessages());
        }

        document.getElementById("msgInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") sendMsg();
        });

        setInterval(loadMessages, 2000);
        loadMessages();
    </script>
</body>
</html>
